# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "772b207205dcd34f8f3eb724972869cc"
name = "Retainify"
application_url = "https://retainify.growzar.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = [ "checkouts/update", "checkouts/create" ]
  uri = "/webhooks/checkouts"

  [[webhooks.subscriptions]]
  topics = [ "orders/create", "orders/paid" ]
  uri = "/webhooks/orders"

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_checkouts,read_customers,read_orders,write_discounts"

[auth]
redirect_urls = [
  "https://retainify.growzar.com/auth/callback",
  "https://retainify.growzar.com/auth/shopify/callback",
  "https://retainify.growzar.com/api/auth/callback"
]

[app_proxy]
url = "https://retainify.growzar.com"
subpath = "retainify"
prefix = "apps"
